<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <button><div class="navicon"></div></button>
        <ul class="visible-links">
          {% if page.lang == 'zh' %}
            <li class="masthead__menu-item masthead__menu-item--lg masthead__menu-home-item"><a href="{{ site.baseurl }}/zh/">首页</a></li>
            <li class="masthead__menu-item"><a href="{{ site.baseurl }}/zh/blog/">博客</a></li>
            <li class="masthead__menu-item"><a href="{{ site.baseurl }}/">English</a></li>
          {% else %}
            <li class="masthead__menu-item masthead__menu-item--lg masthead__menu-home-item"><a href="{{ site.baseurl }}/">Homepage</a></li>
            {% for link in site.data.navigation.main %}
              <li class="masthead__menu-item"><a href="{{ link.url }}">{{ link.title }}</a></li>
            {% endfor %}
            <li class="masthead__menu-item"><a href="{{ site.baseurl }}/zh/">中文</a></li>
          {% endif %}
        </ul>
        <ul class="hidden-links hidden"></ul>
      </nav>
    </div>
  </div>
</div>
