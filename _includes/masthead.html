<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <button><div class="navicon"></div></button>
        <ul class="visible-links">
          {% if page.lang == 'zh' %}
            <li class="masthead__menu-item masthead__menu-item--lg masthead__menu-home-item"><a href="{{ '/zh/' | relative_url }}">首页</a></li>
            <li class="masthead__menu-item"><a href="{{ '/zh/blog/' | relative_url }}">博客</a></li>
          {% else %}
            <li class="masthead__menu-item masthead__menu-item--lg masthead__menu-home-item"><a href="{{ '/' | relative_url }}">Homepage</a></li>
            {% for link in site.data.navigation.main %}
              <li class="masthead__menu-item"><a href="{{ link.url | relative_url }}">{{ link.title }}</a></li>
            {% endfor %}
          {% endif %}
        </ul>
        <ul class="hidden-links hidden"></ul>
      </nav>
    </div>
    <div class="masthead__lang">
      {% if page.lang == 'zh' %}
        <a href="{{ '/' | relative_url }}">English</a>
      {% else %}
        <a href="{{ '/zh/' | relative_url }}">中文</a>
      {% endif %}
    </div>
  </div>
</div>
